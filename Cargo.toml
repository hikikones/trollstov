[package]
name = "jukebox"
version = "0.1.0"
edition = "2024"

[dependencies]
arboard = { version = "3.6", default-features = false }
fastrand = "2.3"
ignore = { version = "0.4", features = ["simd-accel"] }
image = "0.25.9"
indexmap = "2.13.0"
itoa = "1.0"
lofty = "0.22"
nucleo-matcher = "0.3"
ratatui = "0.30"
ratatui-image = { version = "10.0", default-features = false, features = [
  "crossterm"
] }
rodio = "0.21"
terminal-colorsaurus = "1.0"
unicode-segmentation = "1.12"
unicode-width = "0.2"
walkdir = "2.5"
